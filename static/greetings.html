<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunayatan - Shubhkamnaye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-pending { background: #f3f4f6; color: #6b7280; }
        .badge-sent { background: #dbeafe; color: #1e40af; }
        .badge-delivered { background: #fef3c7; color: #92400e; }
        .badge-read { background: #dcfce7; color: #166534; }
        .badge-failed { background: #fee2e2; color: #991b1b; }
        .badge-draft { background: #f3f4f6; color: #6b7280; }
        .badge-running { background: #dbeafe; color: #1e40af; }
        .badge-completed { background: #dcfce7; color: #166534; }
        .badge-paused { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Login Screen -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-2 text-gray-800">Shubhkamnaye</h1>
            <p class="text-gray-500 text-center mb-6 text-sm">Gunayatan Greeting Messages</p>
            <div id="loginError" class="hidden bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm"></div>
            <input id="loginPassword" type="password" placeholder="Enter password"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                onkeydown="if(event.key==='Enter') doLogin()">
            <button onclick="doLogin()"
                class="w-full bg-blue-600 text-white rounded-lg px-4 py-3 font-medium hover:bg-blue-700 transition">
                Login
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="appScreen" class="hidden">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <div>
                <h1 class="text-lg font-bold text-gray-800">Shubhkamnaye</h1>
                <p class="text-xs text-gray-500">Gunayatan Greeting Messages</p>
            </div>
            <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-red-500">Logout</button>
        </header>

        <div class="max-w-4xl mx-auto p-4 space-y-6">
            <!-- Upload Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-lg font-semibold mb-4">Upload Greetings</h2>
                <p class="text-sm text-gray-500 mb-4">
                    Upload an Excel file (.xlsx) with columns: <strong>Name</strong>, <strong>Phone/Mobile</strong>, <strong>Image URL/Link</strong>
                </p>
                <div id="uploadError" class="hidden bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm"></div>
                <div id="uploadSuccess" class="hidden bg-green-50 text-green-700 p-3 rounded-lg mb-4 text-sm"></div>

                <form id="uploadForm" onsubmit="doUpload(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Excel File</label>
                        <input type="file" id="fileInput" accept=".xlsx,.xls" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-blue-50 file:text-blue-700 file:font-medium file:cursor-pointer">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Template Name</label>
                            <input type="text" id="templateName" value="shubhkamnaye"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Language</label>
                            <select id="templateLang" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                                <option value="hi">Hindi</option>
                                <option value="en">English</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Campaign Name (optional)</label>
                        <input type="text" id="campaignName" placeholder="Auto-generated if empty"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <button type="submit" id="uploadBtn"
                        class="bg-blue-600 text-white rounded-lg px-6 py-2.5 font-medium hover:bg-blue-700 transition text-sm">
                        Upload & Send
                    </button>
                </form>
            </div>

            <!-- Campaigns List -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold">Campaign History</h2>
                    <button onclick="loadCampaigns()" class="text-sm text-blue-600 hover:text-blue-800">Refresh</button>
                </div>
                <div id="campaignsList" class="space-y-3">
                    <p class="text-gray-400 text-sm">Loading...</p>
                </div>
            </div>

            <!-- Campaign Detail (shown when a campaign is selected) -->
            <div id="campaignDetail" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold" id="detailTitle">Campaign Detail</h2>
                    <button onclick="closeCampaignDetail()" class="text-sm text-gray-500 hover:text-gray-700">Close</button>
                </div>
                <!-- Stats -->
                <div id="detailStats" class="grid grid-cols-5 gap-3 mb-4"></div>
                <!-- Recipients Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b text-left text-gray-500">
                                <th class="py-2 px-2">Name</th>
                                <th class="py-2 px-2">Phone</th>
                                <th class="py-2 px-2">Status</th>
                                <th class="py-2 px-2">Sent At</th>
                            </tr>
                        </thead>
                        <tbody id="detailRecipients"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
let csrfToken = '';
let refreshInterval = null;
let activeCampaignId = null;

function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : '';
}

async function api(url, opts = {}) {
    const headers = opts.headers || {};
    if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
    const resp = await fetch(url, { ...opts, headers, credentials: 'include' });
    if (resp.status === 401) {
        showLogin();
        throw new Error('Unauthorized');
    }
    return resp;
}

function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
    if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
}

function showApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    loadCampaigns();
}

async function checkAuth() {
    try {
        const resp = await fetch('/auth/greetings-check', { credentials: 'include' });
        const data = await resp.json();
        if (data.authenticated) {
            csrfToken = getCookie('greetings_csrf');
            showApp();
        } else {
            showLogin();
        }
    } catch { showLogin(); }
}

async function doLogin() {
    const pw = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    try {
        const resp = await fetch('/auth/greetings-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw }),
            credentials: 'include',
        });
        if (resp.ok) {
            const data = await resp.json();
            csrfToken = getCookie('greetings_csrf') || data.csrf_token;
            showApp();
        } else {
            errEl.textContent = 'Invalid password';
            errEl.classList.remove('hidden');
        }
    } catch (e) {
        errEl.textContent = 'Login failed: ' + e.message;
        errEl.classList.remove('hidden');
    }
}

async function doLogout() {
    await fetch('/auth/greetings-logout', { method: 'POST', credentials: 'include' });
    showLogin();
}

async function doUpload(event) {
    event.preventDefault();
    const btn = document.getElementById('uploadBtn');
    const errEl = document.getElementById('uploadError');
    const successEl = document.getElementById('uploadSuccess');
    errEl.classList.add('hidden');
    successEl.classList.add('hidden');

    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return;

    btn.disabled = true;
    btn.textContent = 'Uploading...';

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('template_name', document.getElementById('templateName').value);
    formData.append('language', document.getElementById('templateLang').value);
    formData.append('campaign_name', document.getElementById('campaignName').value);

    try {
        const resp = await api('/api/greetings/upload', {
            method: 'POST',
            body: formData,
        });
        let data;
        const contentType = resp.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            data = await resp.json();
        } else {
            const text = await resp.text();
            data = { detail: text || `Server error (${resp.status})` };
        }
        if (resp.ok) {
            successEl.textContent = `Campaign started! ${data.recipients?.added || 0} recipients added.`;
            successEl.classList.remove('hidden');
            fileInput.value = '';
            document.getElementById('campaignName').value = '';
            loadCampaigns();
            if (data.campaign_id) {
                showCampaignDetail(data.campaign_id);
            }
        } else {
            errEl.textContent = data.detail || `Upload failed (${resp.status})`;
            errEl.classList.remove('hidden');
        }
    } catch (e) {
        errEl.textContent = 'Upload error: ' + e.message;
        errEl.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Send';
    }
}

async function loadCampaigns() {
    try {
        const resp = await api('/api/greetings/campaigns');
        const data = await resp.json();
        const list = document.getElementById('campaignsList');

        if (!data.campaigns || data.campaigns.length === 0) {
            list.innerHTML = '<p class="text-gray-400 text-sm">No greeting campaigns yet. Upload an Excel file to get started.</p>';
            return;
        }

        list.innerHTML = data.campaigns.map(c => {
            const total = c.recipient_count || 0;
            const sent = (c.sent_count || 0) + (c.delivered_count || 0) + (c.read_count || 0);
            const failed = c.failed_count || 0;
            const date = c.created_at ? new Date(c.created_at + 'Z').toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) : '';
            return `
                <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 cursor-pointer transition" onclick="showCampaignDetail('${c.id}')">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="font-medium text-gray-800">${esc(c.name)}</span>
                            <span class="badge badge-${c.status} ml-2">${c.status}</span>
                        </div>
                        <span class="text-xs text-gray-400">${date}</span>
                    </div>
                    <div class="mt-2 text-xs text-gray-500">
                        ${total} recipients | ${sent} sent | ${failed} failed | Template: ${esc(c.template_name)}
                    </div>
                </div>`;
        }).join('');
    } catch (e) {
        console.error('Load campaigns error:', e);
    }
}

async function showCampaignDetail(campaignId) {
    activeCampaignId = campaignId;
    document.getElementById('campaignDetail').classList.remove('hidden');

    // Start auto-refresh
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => refreshCampaignDetail(campaignId), 5000);

    await refreshCampaignDetail(campaignId);
}

async function refreshCampaignDetail(campaignId) {
    try {
        const resp = await api(`/api/greetings/campaigns/${campaignId}`);
        const c = await resp.json();

        document.getElementById('detailTitle').textContent = c.name || 'Campaign Detail';

        const stats = c.recipient_stats || {};
        document.getElementById('detailStats').innerHTML = `
            <div class="bg-gray-50 rounded-lg p-3 text-center">
                <div class="text-xl font-bold text-gray-800">${stats.total || 0}</div>
                <div class="text-xs text-gray-500">Total</div>
            </div>
            <div class="bg-blue-50 rounded-lg p-3 text-center">
                <div class="text-xl font-bold text-blue-600">${stats.sent || 0}</div>
                <div class="text-xs text-gray-500">Sent</div>
            </div>
            <div class="bg-yellow-50 rounded-lg p-3 text-center">
                <div class="text-xl font-bold text-yellow-600">${stats.delivered || 0}</div>
                <div class="text-xs text-gray-500">Delivered</div>
            </div>
            <div class="bg-green-50 rounded-lg p-3 text-center">
                <div class="text-xl font-bold text-green-600">${stats.read || 0}</div>
                <div class="text-xs text-gray-500">Read</div>
            </div>
            <div class="bg-red-50 rounded-lg p-3 text-center">
                <div class="text-xl font-bold text-red-600">${stats.failed || 0}</div>
                <div class="text-xs text-gray-500">Failed</div>
            </div>`;

        const recipients = c.recipients || [];
        document.getElementById('detailRecipients').innerHTML = recipients.map(r => {
            const sentAt = r.sent_at ? new Date(r.sent_at + 'Z').toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' }) : '-';
            return `
                <tr class="border-b border-gray-100">
                    <td class="py-2 px-2">${esc(r.name || '-')}</td>
                    <td class="py-2 px-2 font-mono text-xs">${esc(r.phone)}</td>
                    <td class="py-2 px-2"><span class="badge badge-${r.status}">${r.status}</span></td>
                    <td class="py-2 px-2 text-xs text-gray-500">${sentAt}</td>
                </tr>`;
        }).join('');

        // Stop refreshing when campaign is done
        if (c.status === 'completed' || c.status === 'failed') {
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
        }
    } catch (e) {
        console.error('Refresh detail error:', e);
    }
}

function closeCampaignDetail() {
    document.getElementById('campaignDetail').classList.add('hidden');
    activeCampaignId = null;
    if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

// Init
checkAuth();
</script>
</body>
</html>
